<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Attempt with JavaScript Cookie</title>
    <!-- bootstrap css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <section class="container p-3 d-flex flex-column align-items-center">
        <form id="myForm" class="d-flex mt-5 p-5 flex-column border border-2 border-secondary-rounded bg-light shadow-lg rounded">
            <div class="card-title mb-2">
                <h2 class="text-center text-secondary text-small">Login with your credentials!</h2>
            </div>
            <div class="form-group mt-3 mb-2 d-flex flex-column">
                <label for="username" class="me-2">Username:</label>
                <input type="text" id="username" name="username" class="form-control mb-2">
            </div>
            <div class="form-group mt-3 mb-2 d-flex flex-column">
                <label for="password" class="me-2">Password:</label>
                <input type="password" id="password" name="password" class="form-control mb-2">
            </div>
            <button type="submit" class="btn btn-secondary mt-3 btn-small btn-block" id="loginBtn">Login</button>
            <span class="text-danger text-small mt-2" id="errorMessage"></span>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
