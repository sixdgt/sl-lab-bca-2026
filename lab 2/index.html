<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Study One: To-do-List App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" 
    referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="container">
        <h1>TO DO LIST</h>
        <p>A simple javascript to-do-list app using HTML, CSS, and JavaScript.</p>
        <p>Note: For storing tasks, this app uses the browser's local storage.</p>
        <form id="createTaskForm">
            <label for="taskInput">Enter a task:</label>
            <input type="text" id="taskInput" name="taskInput">
            <button type="submit" id="addTask"><i class="fa-solid fa-plus"></i> Add Task</button>
        </form>
    </section>
    <section class="container">
        <h1>Your Tasks</h1>
        <ul id="taskList">
            <!-- <li>Example Two <button id="removeTask"><i class="fa-solid fa-xmark"></i></button></li>
            <li>Example One <button id="removeTask"><i class="fa-solid fa-xmark"></i></button></li> -->
        </ul>
    </section> 
    <script src="function.js"></script>
</body>
</html>
